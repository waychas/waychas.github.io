<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --dim: #666666;
            --border: #eeeeee;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            margin: 0;
            padding: 80px 40px;
            display: flex;
            justify-content: center;
        }

        .content {
            max-width: 540px;
            width: 100%;
        }

        header {
            margin-bottom: 60px;
        }

        .metadata {
            font-size: 12px;
            /*letter-spacing: 0.1em;*/
            color: var(--dim);
            margin-bottom: 8px;
            display: block;
        }

        h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .intro {
            font-size: 15px;
            margin-bottom: 40px;
        }

        .intro p {
            margin-bottom: 24px;
        }

        nav {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            margin-right: 24px;
            display: inline-block;
            transition: opacity 0.2s;
        }

        nav a:hover {
            opacity: 0.5;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        /* Explicit utility class for right alignment */
        .push-right {
            margin-left: auto;
            margin-right: 0 !important;
        }

        .mono {
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="content">
        <header>
            <span class="metadata">about</span>
            <h1>Vecha Sumanth</h1>
            <span class="metadata">IIT BHU '23 | SSE @ Oracle</span>
        </header>

        <section class="intro">
            <p>
                Engineering and Infra. Manifesting a jam session with John Mayer. 🤞
            </p>
            <p>
                hmu for collaboration
            </p>
        </section>

        <nav>
            <a href="https://waychas.github.io/thoughts.html">Thoughts</a>
            <a href="https://www.linkedin.com/in/vecha-sumanth/">LinkedIn</a>
            <a href="mailto:vecha.sumanth@gmail.com">Contact</a>
            <a href="https://open.spotify.com/track/3nuQM7XGTvgxUaoWPVDXxr?si=70cb80bac46e42ff" class="push-right">dopamine</a>
        </nav>
    </div>

</body>
</html>
